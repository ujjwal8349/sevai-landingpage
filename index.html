<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>SevAI - Smart Resource Allocation</title>
  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(to right, #0f2027, #203a43, #2c5364);
      color: white;
      text-align: center;
    }

    .container {
      padding: 60px 20px;
    }

    h1 {
      font-size: 40px;
    }

    h1 span {
      color: red;
    }

    .btn {
      background: red;
      padding: 15px 30px;
      border: none;
      border-radius: 25px;
      color: white;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
    }

    .features {
      display: flex;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 40px;
    }

    .card {
      background: #1e2a38;
      margin: 15px;
      padding: 20px;
      width: 250px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>SevAI <span>Smart Resource Allocation</span></h1>
  <p>Connect Volunteers with Real Needs using Data</p>

  <button class="btn" onclick="launchApp()">Launch App</button>

  <div class="features">
    <div class="card">
      <h3>Volunteer Management</h3>
      <p>Manage volunteer data and skills</p>
    </div>

    <div class="card">
      <h3>Needs Tracking</h3>
      <p>Track community requirements</p>
    </div>

    <div class="card">
      <h3>Smart Matching</h3>
      <p>Auto match volunteers with needs</p>
    </div>

    <div class="card">
      <h3>Dashboard Analytics</h3>
      <p>Visual insights and reports</p>
    </div>
  </div>
</div>

<script>
  function launchApp() {
  window.location.href = "https://iacademy2.oracle.com/ords/r/in_a762_sql_s06/sevai/dashboard?session=5487922992702";
}
</script>

</body>
</html>
